[package]
name = "rust_core"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
argon2 = "0.5.3"
bip39 = "2.2.2"
chacha20poly1305 = "0.10.1"
flutter_rust_bridge = "=2.11.1"
getrandom = "0.4.2"
rand = "0.10.0"
rand_core = "0.10.0"
sp-core = { version = "39.0.0", features = ["full_crypto"] }
subxt = { version = "0.50", default-features = false, features = ["jsonrpsee", "native", "runtime"] }
tokio = { version = "1.50.0", features = ["rt", "macros"] }
zeroize = "1.8.2"
zxcvbn = "3.1.0"
